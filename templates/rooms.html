{{define "content"}}
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">Daftar Ruangan</h2>
    </div>

    <div class="mb-4">
        <button class="btn btn-primary me-2 filter-btn active" data-type="all">Semua</button>
        <button class="btn btn-outline-primary me-2 filter-btn" data-type="meeting_room">Ruang Meeting</button>
        <button class="btn btn-outline-primary me-2 filter-btn" data-type="event_hall">Aula Event</button>
        <button class="btn btn-outline-primary filter-btn" data-type="coworking">Coworking</button>
    </div>

    <div class="row g-4" id="rooms-grid">
        {{range .Rooms}}
        <div class="col-md-4 room-item" data-type="{{.Type}}">
            <div class="card room-card h-100 shadow-sm">
                <img src="{{.ImageURL}}" class="card-img-top" alt="{{.Name}}" style="height:200px;object-fit:cover;">
                <div class="card-body">
                    <span class="badge badge-type-{{.Type}} mb-2">{{typeLabel .Type}}</span>
                    <h5 class="card-title">{{.Name}}</h5>
                    <p class="text-muted mb-1"><i class="bi bi-geo-alt"></i> {{.Location}}</p>
                    <p class="text-muted mb-1"><i class="bi bi-people"></i> Kapasitas: {{.Capacity}} orang</p>
                    <p class="fw-bold text-primary mb-0">{{formatCurrency .PricePerHour}}/jam</p>
                    <p class="text-muted small">{{formatCurrency .PricePerDay}}/hari</p>
                </div>
                <div class="card-footer bg-transparent">
                    {{if .IsAvailable}}
                    <a href="/rooms/{{.ID}}" class="btn btn-primary w-100">Lihat Detail</a>
                    {{else}}
                    <button class="btn btn-secondary w-100" disabled>Tidak Tersedia</button>
                    {{end}}
                </div>
            </div>
        </div>
        {{end}}
    </div>
</div>
{{end}}
