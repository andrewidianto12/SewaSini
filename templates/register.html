{{define "content"}}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-person-plus text-primary fs-1"></i>
                        <h3 class="fw-bold mt-2">Daftar Akun Baru</h3>
                        <p class="text-muted">Bergabung dengan SewaSini sekarang</p>
                    </div>
                    <form action="/register" method="POST">
                        <div class="mb-3">
                            <label class="form-label">Nama Lengkap</label>
                            <input type="text" class="form-control" name="name" required placeholder="Nama lengkap Anda">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" name="email" required placeholder="email@contoh.com">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">No. Telepon</label>
                            <input type="tel" class="form-control" name="phone" placeholder="08xxxxxxxxxx">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" name="password" required placeholder="Minimal 6 karakter">
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 mb-3">Daftar</button>
                        <p class="text-center text-muted mb-0">Sudah punya akun? <a href="/login" class="text-primary">Masuk</a></p>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{{end}}
